# 1) Definição dos UPSTREAMS
upstream portal {
    server portal:80;
}

upstream webmail {
    server webmail:80;
}

# 2) Servidor HTTP para todos os domínios
server {
    listen 80;
    server_name portal.sonserina.br webmail.sonserina.br sonserina.sonserina.br www.sonserina.br;

    # Local para desafios ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionamento HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 3) Servidor HTTPS para o portal
server {
    listen 443 ssl http2;
    server_name portal.sonserina.br;

    ssl_certificate /etc/letsencrypt/live/portal.sonserina.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.sonserina.br/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    access_log /var/log/nginx/portal_access.log;
    error_log /var/log/nginx/portal_error.log;

    location / {
        proxy_pass http://portal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

# 4) Servidor HTTPS para o webmail
server {
    listen 443 ssl http2;
    server_name webmail.sonserina.br;

    ssl_certificate /etc/letsencrypt/live/webmail.sonserina.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webmail.sonserina.br/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    access_log /var/log/nginx/webmail_access.log;
    error_log /var/log/nginx/webmail_error.log;

    location / {
        proxy_pass http://webmail;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}